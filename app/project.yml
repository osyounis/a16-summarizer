# XcodeGen spec for the a16-summarizer on-device app.
#
# Regenerate the .xcodeproj with:  cd app && xcodegen generate
# (xcodegen is only needed to (re)generate the project; building just needs Xcode.)
#
# Package versions are pinned to the exact set the app was verified against.
name: A16Summarizer
options:
  bundleIdPrefix: com.osyounis
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.2"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: "YES"
    DEVELOPMENT_TEAM: ""            # set your team in Xcode > Signing & Capabilities
    CODE_SIGN_STYLE: Automatic

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    exactVersion: "3.31.3"
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    exactVersion: "0.31.4"
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface.git
    exactVersion: "0.9.0"
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    exactVersion: "1.3.0"

targets:
  A16Summarizer:
    type: application
    platform: iOS
    sources:
      - path: A16Summarizer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.osyounis.a16summarizer
        PRODUCT_NAME: A16Summarizer
        INFOPLIST_KEY_CFBundleDisplayName: a16 Summarizer
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: A16Summarizer/A16Summarizer.entitlements
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: mlx-swift
        product: MLX
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
